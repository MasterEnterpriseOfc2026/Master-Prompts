<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="description" content="Master Prompts — catálogo local de prompts prontos, organizado por categoria.">
<title>Master Prompts</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <header id="topbar">
    <button class="icon-btn" id="btnMenu" type="button" aria-label="Abrir menu de categorias" aria-haspopup="dialog" aria-expanded="false" aria-controls="drawer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <div class="brand">
      <span class="brand-name">Master Prompts</span>
    </div>
    <button class="icon-btn" id="btnNewChat" type="button" aria-label="Iniciar novo bate-papo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </button>
  </header>

  <div class="drawer-overlay hidden" id="drawerOverlay"></div>
  <aside class="drawer hidden" id="drawer" role="dialog" aria-modal="true" aria-label="Menu de categorias" aria-hidden="true">
    <div class="drawer-header">
      <span class="logo-mount" data-size="30"></span>
      <h2>Master Prompts</h2>
      <button class="icon-btn" id="btnCloseDrawer" type="button" aria-label="Fechar menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button class="drawer-item drawer-item-accent" id="drawerNewChat" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" width="20" height="20">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/>
      </svg>
      <span class="drawer-item-text">Novo bate-papo</span>
    </button>
    <div class="drawer-section-label" id="drawerCategoryLabel">Categorias de prompts</div>
    <div id="drawerCategoryList" role="list" aria-labelledby="drawerCategoryLabel"></div>
    <div class="drawer-footer">
      <span class="logo-mount" data-size="22"></span>
      <div>
        <div class="drawer-footer-title">Master Prompts</div>
        <div class="drawer-footer-sub">v1.2 · banco local de prompts</div>
      </div>
    </div>
  </aside>

  <main id="chatArea">
    <div id="filtersPanel" class="filters-panel hidden">
      <div class="filters-header">
        <h3>Filtros de Pesquisa</h3>
        <button class="icon-btn" id="btnCloseFilters" type="button" aria-label="Fechar filtros">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="filters-content">
        <div class="filter-group">
          <label class="filter-label">Categorias</label>
          <div id="categoryFilters" class="filter-chips"></div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Tipo de Prompt</label>
          <div class="filter-chips">
            <button class="filter-chip" type="button" data-filter="type" data-value="dev">💻 Dev</button>
            <button class="filter-chip" type="button" data-filter="type" data-value="creative">🎨 Criativo</button>
            <button class="filter-chip" type="button" data-filter="type" data-value="business">📈 Negócios</button>
            <button class="filter-chip" type="button" data-filter="type" data-value="productivity">🧠 Produtividade</button>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Dificuldade</label>
          <div class="filter-chips">
            <button class="filter-chip" type="button" data-filter="difficulty" data-value="beginner">Iniciante</button>
            <button class="filter-chip" type="button" data-filter="difficulty" data-value="intermediate">Intermediário</button>
            <button class="filter-chip" type="button" data-filter="difficulty" data-value="advanced">Avançado</button>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Status</label>
          <div class="filter-chips">
            <button class="filter-chip" type="button" data-filter="status" data-value="popular">⭐ Popular</button>
            <button class="filter-chip" type="button" data-filter="status" data-value="new">🆕 Novo</button>
            <button class="filter-chip" type="button" data-filter="status" data-value="verified">✅ Verificado</button>
          </div>
        </div>
        <div class="filter-actions">
          <button class="btn-secondary" id="btnClearFilters" type="button">Limpar Filtros</button>
          <button class="btn-primary" id="btnApplyFilters" type="button">Aplicar Filtros</button>
        </div>
      </div>
    </div>
    
    <div id="emptyState">
      <span class="logo-mount" data-size="118" data-secondary="true"></span>
      <h1>Master Prompts</h1>
      <p>Catálogo local de prompts prontos, organizado por categoria.<br>Digite <strong>/prompts</strong> para ver as categorias disponíveis.</p>
      <div class="chip-row">
        <button class="chip" type="button" data-cmd="/prompts">/prompts</button>
        <button class="chip" type="button" data-cmd="/add">/add</button>
        <button class="chip" type="button" data-cmd="/ajuda">/ajuda</button>
        <button class="chip" type="button" data-cmd="/sobre">/sobre</button>
      </div>
    </div>
    <div id="messages" role="log" aria-live="polite" aria-relevant="additions" aria-label="Histórico de mensagens"></div>
  </main>

  <footer id="inputBar">
    <form class="input-pill" id="inputForm">
      <button class="icon-btn icon-btn-secondary" id="btnFilters" type="button" aria-label="Abrir filtros de pesquisa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      </button>
      <label class="sr-only" for="textInput">Mensagem</label>
      <input id="textInput" type="text" placeholder="Mensagem ou digite /prompts" autocomplete="off" autocorrect="off" enterkeyhint="send" />
      <button id="btnSend" type="submit" aria-label="Enviar mensagem" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </form>
    <div class="input-meta">
      <span class="pill-badge">Prompt Engine</span>
    </div>
  </footer>

  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
</div>

<script src="prompts.js"></script>  <!-- primeiro -->
<script src="app.js"></script>       <!-- segundo  -->
</body>
</html>
